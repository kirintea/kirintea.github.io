<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Blog</title>
    <link rel="stylesheet" href="../css/base/styles.css">
    <link rel="stylesheet" href="../css/home.css">
    <style>
        .home-section {
            position: relative;
            min-height: 100vh;
        }
        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #akCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #page_n_2 {
            background-color: #000;
        }
        #page_n_2 .container {
            background-color: #000;
        }
        #page_n_3 {
            background-color: #000;
        }
        #page_n_3 .container {
            background-color: #000;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        #canvas-container canvas {
            width: 100% !important;
            height: 100% !important;
        }
        #home {
            background: radial-gradient(circle at top, #ffffff 0%, #fff7fb 35%, #ffe0ef 100%);
        }
        doro-doro {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <!-- 引入导航栏 -->
    <div id="navbar-placeholder"></div>

    <!-- 第2分页 -->
    <section id="page_n_2" class="home-section">

        <!-- 特效展示区 -->
        <div class="container">
            <canvas id="akCanvas"></canvas>
        </div>
    </section>

    <!-- 第3分页 -->
    <section id="page_n_3" class="home-section">

        <!-- 特效展示区 -->
        <div class="container" id="EPCE-container">
            <div id="canvas-container"></div>
        </div>
    </section>

    <!-- 第5分页 -->
    <section id="about" class="home-section">
        <h2>About Me</h2>
    </section>

    <script src="js/app.js"></script>
    <script src="js/canvasClass.js"></script>
    <script>
        // 等待DOM加载完成后初始化
        window.onload = function() {
            let canvas = document.getElementById('akCanvas');
            if (canvas) {
                console.log('Canvas found:', canvas);
                console.log('Loading particle effect...');

                // 使用图片
                let DameDaneParticleDemo = new DameDaneParticle(canvas, {
                  src: 'assets/images/baizi_hb.png',
                  w: 600,
                  size: 2,
                  spacing: 2,
                  validColor: {
                    min: 300,
                    max: 765,
                    invert: false
                  },
                  effectParticleMode: 'adsorption',
                  Thickness: 25,
                  Drag: 0.95,
                  Ease: 0.1
                }, function() {
                    console.log('Particle effect initialized successfully!');
                });
            } else {
                console.error('Canvas element not found!');
            }
        };
    </script>
    <script type="importmap">
    {
      "imports": {
        "three": "./js/three.module.js"

    }
    </script>
    <script type="module" src="js/EPCE.js"></script>
