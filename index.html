<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KirinTeaAki - AI Engineer & Researcher</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/images/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="64x64" href="./assets/images/favicon-64x64.png">
    <link rel="icon" type="image/png" sizes="128x128" href="./assets/images/favicon-128x128.png">
    <link rel="shortcut icon" type="image/png" href="./assets/images/favicon.png">
    <!-- Importmap for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "./vendor/three/build/three.module.js",
                "three/examples/": "./vendor/three/examples/"
            }
        }
    </script>
    <!-- Tailwind CSS -->
    <script src="./vendor/tailwind/tailwind.min.js"></script>
    <!-- Font Awesome 7.2.0 (offline, local SVG+JS) -->
    <link rel="stylesheet" href="./vendor/fontawesome-7/package/css/svg-with-js.min.css">
    <!-- AOS Animation Library -->
    <link rel="stylesheet" href="./vendor/aos/aos.css">
    <script src="./vendor/aos/aos.js"></script>
    <!-- GSAP for advanced animations -->
    <script src="./vendor/gsap/gsap.min.js"></script>
    <script src="./vendor/gsap/ScrollTrigger.min.js"></script>
    <!-- Chart.js -->
    <script src="./vendor/chartjs/chart.umd.min.js"></script>
    <script src="./vendor/fontawesome-7/package/js/all.min.js"></script>
    <!-- 外部CSS文件 -->
    <link rel="stylesheet" href="css/home/custom.css">
    <link rel="stylesheet" href="css/home/tailwind.css">
    <link rel="stylesheet" href="css/navbar/navbar.css">
    
    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00f5a0',
                        secondary: '#00d9f5',
                        dark: '#0a0a0a',
                        'dark-gray': '#1a1a1a',
                        'light-gray': '#f0f0f0'
                    },
                    fontFamily: {
                        sans: ['Inter', 'Helvetica', 'Arial', 'sans-serif']
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite'
                    }
                }
            }
        };
    </script>
</head>
<body>
    <div id="page-loader" class="page-loader" aria-live="polite" aria-label="Page loading">
        <div class="page-loader__content">
            <div class="page-loader__spinner" aria-hidden="true"></div>
            <p class="page-loader__title">Loading</p>
            <p class="page-loader__hint">The assets are being prepared...</p>
        </div>
    </div>

    <!-- 组件容器 -->
    <div id="header"></div>
    <div id="oc-role"></div>
    <div id="process"></div>
    <!-- <div id="projects"></div> -->
    <div id="skills"></div>
    <div id="blog"></div>
    <!-- <div id="experience"></div> -->
    <!-- <div id="contact"></div> -->
    <!-- <div id="publications"></div> -->
    <!-- <div id="services"></div> -->
    <!-- <div id="cta"></div> -->
    <div id="footer"></div>

    <script>
        (function() {
            const readyState = { navbar: false, home: false };

            function hideLoader() {
                const loader = document.getElementById('page-loader');
                if (!loader || loader.classList.contains('page-loader--hidden')) {
                    return;
                }

                loader.classList.add('page-loader--hidden');
                window.setTimeout(() => loader.remove(), 500);
            }

            function markReady(section) {
                readyState[section] = true;
                if (readyState.navbar && readyState.home) {
                    hideLoader();
                }
            }

            window.addEventListener('app:navbar-ready', () => markReady('navbar'));
            window.addEventListener('app:home-ready', () => markReady('home'));
            window.addEventListener('load', () => {
                window.setTimeout(hideLoader, 4000);
            });
        })();
    </script>
    
    <!-- 外部JavaScript文件 -->
    <script type="module" src="js/navbar/app.js"></script>
    <script type="module" src="js/home/main.js"></script>
</body>
</html>
