<!-- about.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - KirinTea_Aki</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="64x64" href="../assets/images/favicon-64x64.png">
    <link rel="icon" type="image/png" sizes="128x128" href="../assets/images/favicon-128x128.png">
    <link rel="shortcut icon" type="image/png" href="../assets/images/favicon.png">
    <link rel="stylesheet" href="../css/base/styles.css">
    <link rel="stylesheet" href="../css/pages/about.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <!-- Hero Section - Holographic Display -->
    <section id="about-hero" class="about-section hero-section">
        <div class="hologram-bg">
            <div class="scan-line"></div>
            <div class="grid-overlay"></div>
        </div>
        <div class="hero-content">
            <div class="avatar-container">
                <div class="avatar-glow"></div>
                <img src="../assets/images/head.jpg" alt="Avatar" class="avatar">
                <div class="status-indicator">
                    <span class="status-dot online"></span>
                    <span class="status-text">ONLINE</span>
                </div>
            </div>
            <h1 class="name-title">
                <span class="name-main">KirinTea_Aki</span>
                <span class="name-sub">// DIGITAL CREATOR</span>
            </h1>
            <div class="bio-tags">
                <span class="bio-tag">3D Graphics</span>
                <span class="bio-tag">Web Dev</span>
                <span class="bio-tag">AI/ML</span>
                <span class="bio-tag">Creative Coding</span>
            </div>
            <p class="bio-text">
                Exploring the intersection of code, art, and imagination. 
                Building digital experiences that blur the line between reality and virtual.
            </p>
        </div>
    </section>

    <!-- Skills Section - Tech Tree -->
    <section id="skills" class="about-section skills-section">
        <div class="section-header">
            <h2 class="section-title">
                <span class="title-prefix">&lt;</span>
                <span id="skills-title">SKILL TREE</span>
                <span class="title-suffix">/&gt;</span>
            </h2>
        </div>
        <div id="skills-container" class="skills-container">
        </div>
    </section>

    <!-- Timeline Section -->
    <section id="timeline" class="about-section timeline-section">
        <div class="section-header">
            <h2 class="section-title">
                <span class="title-prefix">[</span>
                <span id="timeline-title">JOURNEY</span>
                <span class="title-suffix">]</span>
            </h2>
        </div>
        <div id="timeline-container" class="timeline-container">
            <div class="timeline-line"></div>
        </div>
    </section>

    <!-- Stats Section -->
    <section id="stats" class="about-section stats-section">
        <div id="stats-container" class="stats-container">
        </div>
    </section>

    <script src="../js/app.js"></script>
    <script src="../js/about.js"></script>
</body>
</html>
